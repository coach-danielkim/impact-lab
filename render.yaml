services:
  - type: web
    name: impact-lab
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,impactlab.cloud,www.impactlab.cloud"
      - key: DATABASE_URL
        fromDatabase:
          name: impact-lab-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: impact-lab-db
    plan: free
    databaseName: impact_lab
    user: impact_lab
